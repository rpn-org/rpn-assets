const map=L.map('map',{center:[43.5,143.5],zoom:7});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:18
}).addTo(map);

// ポリライン
const polylines={};
DAYS.forEach(d=>{
  const pts=(TRACKS[d.date]||[]).map(p=>[p[0],p[1]]);
  if(!pts.length)return;
  const pl=L.polyline(pts,{color:d.color,weight:4,opacity:0.9,smoothFactor:1}).addTo(map);
  pl.bindTooltip(d.label,{sticky:true,opacity:0.9,className:'day-tip'});
  polylines[d.date]=pl;
});

// VISIT マーカー
const markers=[];
VISITS.forEach(v=>{
  if(v.dur<10)return;
  const day=DAYS.find(d=>d.date===v.day);
  const col=day?day.color:'#aaa';
  const r=v.dur>=120?9:v.dur>=60?7:v.dur>=30?5:4;
  const m=L.circleMarker([v.lat,v.lon],{
    radius:r,fillColor:col,color:'#fff',weight:1.5,opacity:0.95,fillOpacity:0.9
  }).addTo(map);
  const h=v.dur>=60?Math.floor(v.dur/60)+'時間'+(v.dur%60?v.dur%60+'分':''):v.dur+'分';
  m.bindPopup(`<div style="font-size:12px;line-height:1.7;min-width:170px">
    <b>📍 ${v.name}</b><br>
    🕐 ${v.time}〜${v.end}<br>⏱ 滞在 ${h}
  </div>`);
  m._day=v.day;
  markers.push(m);
});

// 凡例
const leg=document.getElementById('legend');
DAYS.forEach(d=>{
  leg.innerHTML+=`<div class="leg-row"><div class="leg-line" style="background:${d.color}"></div><span>${d.label}</span></div>`;
});
leg.innerHTML+=`<div class="leg-row" style="margin-top:4px">
  <div style="width:10px;height:10px;border-radius:50%;background:#888;border:1.5px solid #fff;flex-shrink:0"></div>
  <span>立ち寄りスポット（●サイズ＝滞在時間）</span></div>`;

// 日別ボタン
const ctrl=document.getElementById('controls');
DAYS.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='day-btn active';
  btn.style.borderColor=d.color;btn.style.color=d.color;
  btn.textContent=d.date;btn.dataset.date=d.date;
  btn.onclick=()=>toggleDay(d.date,btn);
  ctrl.appendChild(btn);
});

let active=new Set(DAYS.map(d=>d.date));
function toggleDay(date,btn){
  if(active.has(date)){
    active.delete(date);btn.classList.remove('active');
    if(polylines[date])polylines[date].setStyle({opacity:0.08});
    markers.filter(m=>m._day===date).forEach(m=>m.setStyle({fillOpacity:0.08,opacity:0.08}));
  }else{
    active.add(date);btn.classList.add('active');
    if(polylines[date])polylines[date].setStyle({opacity:0.9});
    markers.filter(m=>m._day===date).forEach(m=>m.setStyle({fillOpacity:0.9,opacity:0.95}));
  }
  document.getElementById('btn-all').classList.toggle('active',active.size===7);
}

function toggleAll(){
  const all=active.size===7;
  document.querySelectorAll('.day-btn').forEach(btn=>{
    const d=btn.dataset.date;
    if(all){
      active.delete(d);btn.classList.remove('active');
      if(polylines[d])polylines[d].setStyle({opacity:0.08});
      markers.filter(m=>m._day===d).forEach(m=>m.setStyle({fillOpacity:0.08,opacity:0.08}));
    }else{
      active.add(d);btn.classList.add('active');
      if(polylines[d])polylines[d].setStyle({opacity:0.9});
      markers.filter(m=>m._day===d).forEach(m=>m.setStyle({fillOpacity:0.9,opacity:0.95}));
    }
  });
  document.getElementById('btn-all').classList.toggle('active',!all);
}

// アニメーション
let animR=false,animT=null,animM=null;
function toggleAnim(){
  const btn=document.getElementById('anim-btn');
  if(animR){
    clearTimeout(animT);animR=false;
    btn.textContent='▶ 再生';
    if(animM){animM.remove();animM=null;}
    document.getElementById('info-box').style.display='none';
    return;
  }
  animR=true;btn.textContent='⏹ 停止';
  const all=[];
  DAYS.forEach(d=>{
    const pts=TRACKS[d.date]||[];
    pts.forEach((p,i)=>all.push({lat:p[0],lon:p[1],color:d.color,label:d.label,i,n:pts.length}));
  });
  if(!all.length)return;
  animM=L.circleMarker([all[0].lat,all[0].lon],{radius:9,fillColor:'#fff',color:'#222',weight:2.5,fillOpacity:1}).addTo(map);
  const box=document.getElementById('info-box');box.style.display='block';
  let idx=0;
  (function step(){
    if(!animR||idx>=all.length){
      animR=false;btn.textContent='▶ 再生';
      if(animM){animM.remove();animM=null;}
      box.style.display='none';return;
    }
    const p=all[idx];
    animM.setLatLng([p.lat,p.lon]);
    animM.setStyle({fillColor:p.color});
    box.innerHTML=`<b>${p.label}</b><br>GPS点 ${p.i+1}/${p.n}`;
    if(idx%4===0)map.panTo([p.lat,p.lon],{animate:false});
    idx++;animT=setTimeout(step,25);
  })();
}
